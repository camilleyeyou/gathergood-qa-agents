[phases.setup]
nixPkgs = ["chromium", "chromium-chromedriver"]

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install --with-deps chromium"]

[phases.build]
cmds = ["playwright install --with-deps chromium"]

[start]
cmd = "playwright install chromium && uvicorn api.persona_runner:app --host 0.0.0.0 --port ${PORT:-8000}"

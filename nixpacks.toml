[phases.setup]
# System deps needed by Playwright Chromium
nixPkgs = [
  "bash",
  "chromium",
  "nss",
  "at-spi2-atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "dbus",
  "glib",
  "gtk3",
  "expat",
  "nspr",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["PLAYWRIGHT_BROWSERS_PATH=/app/.browsers python -m playwright install chromium"]

[start]
cmd = "bash start.sh"
